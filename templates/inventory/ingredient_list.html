{% extends "base.html" %}
{% block content %}
    <div class="max-w-4xl mx-auto my-8 px-4 font-sans">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-slate-800">Ingredient Inventory</h2>
            <a href="{% url 'inventory:ingredient_add' %}"
               class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors duration-200">
                Add Ingredient
            </a>
        </div>
        <div class="flex flex-col border border-slate-300 rounded-xl overflow-hidden shadow-sm">
            <div class="grid grid-cols-12 items-stretch bg-slate-50 border-b-2 border-slate-300 text-xs font-semibold uppercase tracking-wider text-slate-600">
                <div class="col-span-5 p-4 border-r border-slate-300">Ingredient Name</div>
                <div class="col-span-2 p-4 border-r border-slate-300 text-center">Price</div>
                <div class="col-span-3 p-4 border-r border-slate-300 text-center">Stock Quantity</div>
                <div class="col-span-2 p-4 text-right">Actions</div>
            </div>
            {% include "inventory/partials/_ingredient_results.html" %}
        </div>
    </div>
{% endblock content %}
