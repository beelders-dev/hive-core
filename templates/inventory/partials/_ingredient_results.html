<div class="h-[400px] overflow-y-auto rounded-xl border border-slate-200">
    <!-- HEADER -->
    <div class="sticky top-0 z-10 grid grid-cols-12 items-stretch bg-slate-50 border-b-2 border-slate-300 text-xs font-semibold uppercase tracking-wider text-slate-600">
        <div class="col-span-5 p-4 border-r border-slate-300">Ingredient Name</div>
        <div class="col-span-2 p-4 border-r border-slate-300 text-center">Price</div>
        <div class="col-span-3 p-4 border-r border-slate-300 text-center">Stock Quantity</div>
        <div class="col-span-2 p-4 text-right">Actions</div>
    </div>
    <!-- ROWS -->
    {% for ingredient in ingredient_list %}
        <div class="grid grid-cols-12 items-stretch bg-white border-b border-slate-200 hover:bg-slate-50 transition-colors duration-150">
            <div class="col-span-5 p-4 border-r border-slate-200 flex items-center font-medium text-slate-900">
                {{ ingredient.name }}
            </div>
            <div class="col-span-2 p-4 border-r border-slate-200 flex items-center justify-center font-mono text-slate-600">
                ₱{{ ingredient.price }}
            </div>
            <div class="col-span-3 p-4 border-r border-slate-200 flex items-center justify-center font-mono text-slate-600">
                {{ ingredient.stock_qty }}
            </div>
            <div class="col-span-2 p-4 flex items-center justify-center gap-2">
                <a href="{{ ingredient.get_absolute_url }}"
                   class="text-sm font-medium text-blue-600 hover:underline">View</a>
                {% if ingredient.stock_qty > 0 %}
                    <button class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm shadow-sm hover:bg-slate-100"
                            hx-post="{% url 'production:add_ingredient_to_draft' ingredient.id %}"
                            hx-target="#selected-ingredients">Add</button>
                {% endif %}
            </div>
        </div>
    {% empty %}
        <div class="p-12 text-center text-sm text-slate-500 bg-white">No ingredients found in your inventory.</div>
    {% endfor %}
</div>
