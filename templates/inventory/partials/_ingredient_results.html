{% for ingredient in ingredient_list %}
    <div class="grid grid-cols-12 items-stretch bg-white border-b border-slate-200 last:border-b-0 hover:bg-slate-50 transition-colors duration-150">
        <div class="col-span-5 p-4 border-r border-slate-200 flex items-center font-medium text-slate-900">
            {{ ingredient.name }}
        </div>
        <div class="col-span-2 p-4 border-r border-slate-200 flex items-center justify-center font-mono text-slate-600">
            ₱{{ ingredient.price }}
        </div>
        <div class="col-span-3 p-4 border-r border-slate-200 flex items-center justify-center font-mono text-slate-600">
            {{ ingredient.stock_qty }}
        </div>
        <div class="col-span-2 p-4 flex items-center justify-center text-right">
            <a href="{{ ingredient.get_absolute_url }}"
               class="text-sm font-medium text-blue-600 hover:underline">View</a>
        </div>
    </div>
{% empty %}
    <div class="p-12 text-center text-sm text-slate-500 bg-white">No ingredients found in your inventory.</div>
{% endfor %}
