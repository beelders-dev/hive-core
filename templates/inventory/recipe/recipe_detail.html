{% extends "_base.html" %}
{% block content %}
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Recipe: {{ recipe.name }}</h1>
        <div class="hidden md:flex justify-between px-4 py-2 text-sm font-semibold text-gray-500 border-b">
            <span>Ingredient Name</span>
            <span>Quantity Required</span>
        </div>
        <!-- The Loop -->
        {% for item in recipe.get_all_ingredients %}
            <div class="flex justify-between items-center px-4 py-4 border-b hover:bg-gray-50 transition-colors">
                <!-- Now you can control the row padding directly on this parent div! -->
                <div class="text-gray-900 font-medium">{{ item.ingredient.name }}</div>
                <div class="text-gray-600 bg-gray-100 px-3 py-1 rounded-full text-sm">{{ item.quantity_needed }}g</div>
            </div>
        {% endfor %}
    </div>
{% endblock content %}
