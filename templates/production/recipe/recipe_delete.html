{% extends "_base.html" %}
{% block content %}
    <div class="max-w-md mx-auto my-20 px-4 font-sans">
        <div class="bg-white border border-red-200 rounded-xl overflow-hidden shadow-lg">
            <div class="p-6 bg-red-50 border-b border-red-100 text-center">
                <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8"
                         fill="none"
                         stroke="currentColor"
                         stroke-width="2"
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-red-800">Delete Recipe?</h2>
                <p class="text-sm text-red-600 mt-1">This action cannot be undone.</p>
            </div>
            <div class="p-8 text-center">
                <p class="text-slate-600">
                    Are you sure you want to delete <span class="font-bold text-slate-900">"{{ object.name }}"</span>?
                    This will remove the recipe from the production list forever.
                </p>
            </div>
            <form method="post"
                  class="p-6 bg-slate-50 border-t border-slate-100 flex flex-col gap-3">
                {% csrf_token %}
                <button type="submit"
                        class="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors shadow-sm">
                    Yes, Delete Permanently
                </button>
                <a href="{{ object.get_absolute_url }}"
                   class="w-full py-3 bg-white border border-slate-300 text-slate-700 font-medium rounded-lg text-center hover:bg-slate-50 transition-colors">
                    Cancel, Keep Recipe
                </a>
            </form>
        </div>
    </div>
{% endblock content %}
