<div class="flex flex-col">
    <!-- Header -->
    <div class="grid grid-cols-12 border-b-2 border-slate-200 bg-white text-xs font-semibold uppercase tracking-wider text-slate-500">
        <div class="col-span-8 border-r border-slate-200 p-4">Ingredient</div>
        <div class="col-span-4 p-4 text-right">Quantity Required</div>
    </div>
    <!-- Rows -->
    {% for item in recipe.get_all_ingredients %}
        <div class="grid grid-cols-12 border-b border-slate-100 transition-colors duration-150 hover:bg-slate-50 last:border-b-0">
            <div class="col-span-8 flex items-center border-r border-slate-100 p-4">
                <a href="{{ item.ingredient.get_absolute_url }}"
                   class="font-medium text-slate-900 transition-colors hover:text-blue-600">
                    {{ item.ingredient.name }}
                </a>
            </div>
            <div class="col-span-4 flex items-center justify-end p-4">
                <span class="inline-flex items-center rounded-md bg-slate-100 px-3 py-1 font-mono text-sm font-semibold text-slate-700">
                    {{ item.quantity_needed }}
                    <span class="ml-1 text-[10px] uppercase text-slate-400">{{ item.ingredient.unit }}</span>
                </span>
            </div>
        </div>
    {% empty %}
        <div class="bg-white p-12 text-center text-sm italic text-slate-400">No ingredients listed for this recipe.</div>
    {% endfor %}
</div>
