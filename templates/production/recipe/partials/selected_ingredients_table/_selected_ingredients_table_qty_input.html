<input type="number"
       name="quantity_{{ ingredient.id }}"
       id="quantity_{{ ingredient.id }}"
       min="0"
       required
       step="any"
       placeholder="0.00"
       value="{{ ingredient.required_quantity }}"
       hx-trigger="change"
       class="w-full rounded-lg border border-slate-300 bg-white px-2 py-2 text-center font-mono text-sm text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100 [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none">
