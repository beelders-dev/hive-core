<div class="overflow-hidden bg-transparent">
    <div class="grid grid-cols-12 items-stretch bg-slate-50 border-b-2 border-slate-300 text-xs font-semibold uppercase tracking-wider text-slate-600">
        <div class="col-span-6 p-4 border-r border-slate-300">Ingredient Name</div>
        <div class="col-span-6 p-4 text-center">Required Quantity</div>
    </div>
    {% for ingredient in ingredients %}
        <div class="grid grid-cols-12 items-stretch bg-white border-b border-slate-200 last:border-b-0 hover:bg-slate-50 transition-colors duration-150">
            <div class="col-span-6 p-4 border-r border-slate-200 flex items-center font-medium text-slate-900">
                {{ ingredient.name }}
            </div>
            <div class="col-span-6 p-3 flex items-center justify-center bg-transparent">
                <div class="relative w-full max-w-[120px]">
                    <input type="number"
                           name="quantity_{{ ingredient.id }}"
                           id="quantity_{{ ingredient.id }}"
                           min="0"
                           required
                           step="any"
                           placeholder="0.00"
                           class="w-full text-center rounded-lg border border-slate-200 bg-white px-3 py-1.5 font-mono text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-blue-600 focus:border-blue-600 shadow-sm transition-all [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                </div>
            </div>
        </div>
    {% empty %}
        <div class="p-12 text-center text-sm text-slate-500 bg-white border-b border-slate-200">
            No ingredients found in your inventory.
        </div>
    {% endfor %}
</div>
