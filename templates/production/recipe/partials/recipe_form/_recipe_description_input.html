<div class="space-y-2">
    <label for="description" class="block text-sm font-semibold text-slate-700">Description</label>
    <textarea id="description"
              name="recipe_description"
              rows="5"
              placeholder="Describe the recipe, preparation notes, serving suggestions, or any additional details..."
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100 resize-none">{{ description }}</textarea>
    <p class="text-xs text-slate-500">Optional. Add notes to help identify or prepare this recipe.</p>
</div>
