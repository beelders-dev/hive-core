<button type="submit"
        hx-post="{% url 'production:add_ingredient' ingredient.pk %}"
        hx-target="#selected-ingredients-row"
        hx-swap="beforeend"
        hx-include="[name='ingredient_ids']"
        class="inline-flex items-center gap-1.5 px-3 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <span>+</span>
        <span>Add</span>
</button>
