<button type="submit"
        hx-post="{% url 'production:add_ingredient' ingredient.pk %}"
        hx-target="#selected-ingredients-row"
        hx-swap="beforeend"
        hx-include="[name='ingredient_ids']"
        class="inline-flex items-center justify-center gap-1.5 rounded-lg bg-blue-600 px-3 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-200">
        <span class="text-base leading-none">+</span>
        <span>Add</span>
</button>
