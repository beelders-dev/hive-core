{% extends "_base.html" %}
{% block content %}
    <h1 class="text-4xl font-bold text-gray-400">Recipe List</h1>
    <ul>
        {% for recipe in recipe_list %}
            <li>
                <a href="{{ recipe.get_absolute_url }}">{{ recipe.name }}</a>
            </li>
        {% endfor %}
    </ul>
{% endblock content %}
