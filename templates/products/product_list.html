{% extends "_base.html" %}

{% block content %}
    <h1 class="m-5 text-3xl font-bold ">Products</h1>
    <ul class="flex">
        {% for product in product_list %}
            <a href="{{ product.get_absolute_url }}">
                <li class="m-2 p-2 w-auto border border-gray-50 rounded content-center text-center bg-gray-100 shadow-xl">
                    <p class="text-2xl my-5">{{ product.name }}</p>
                    <p>Stock: {{ product.stock }}</p>
                    <p>Price: P{{ product.price }}</p>
                    <p class="my-5">{{ product.short_description }}</p>
                
                </li>
            </a>

        {% endfor %}
    </ul>
{% endblock %}
