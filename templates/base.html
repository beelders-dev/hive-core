{% load static %}
<!DOCTYPE html>
<html lang="en" class=" bg-slate-50">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"
              content="Hive Core - Premium Inventory & Recipe Management.">
        <link rel="stylesheet" href="{% static 'dist/styles.css' %}">
        <title>Hive Core</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
              rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
                integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
                crossorigin="anonymous"></script>
        <style>body { font-family: 'Inter', sans-serif; }</style>
    </head>
    <body class="min-h-screen flex flex-col text-slate-900"
          hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
        <header class="sticky top-0 z-50 bg-slate-800 shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center gap-2">
                        <div class="bg-blue-600 p-1.5 rounded-lg">
                            <svg class="w-6 h-6 text-white"
                                 fill="none"
                                 stroke="currentColor"
                                 stroke-width="2"
                                 viewBox="0 0 24 24">
                                <path d="M12 2l9 5.14v10.28L12 22l-9-5.57V7.14L12 2z"></path>
                            </svg>
                        </div>
                        <a href="{% url 'home' %}"
                           class="text-xl font-bold text-white tracking-tight">
                            Hive<span class="text-blue-400">Core</span>
                        </a>
                    </div>
                    <nav class="flex items-center gap-6">
                        <a href="{% url 'home' %}"
                           class="text-sm font-medium text-slate-300 hover:text-white transition-colors">Dashboard</a>
                        <a href="{% url 'inventory:ingredient_list' %}"
                           class="text-sm font-medium text-slate-300 hover:text-white transition-colors">Inventory</a>
                        <a href="{% url 'production:recipe_list' %}"
                           class="text-sm font-medium text-slate-300 hover:text-white transition-colors">Recipes</a>
                        <div class="ml-4 pl-4 border-l border-slate-700 flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center text-xs font-bold text-slate-200">
                                AD
                            </div>
                            {% if user.is_authenticated %}
                                <form action={% url 'logout' %} method="post">
                                    {% csrf_token %}
                                    <button type="submit"
                                            class="text-sm font-medium text-slate-300 hover:text-white transition-colors">
                                        Logout
                                    </button>
                                </form>
                            {% endif %}
                        </div>
                    </nav>
                </div>
            </div>
        </header>
        <main class="flex-1 py-10">
            {% block content %}
            {% endblock content %}
        </main>
        <footer class="mt-auto py-8 border-t border-slate-200">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-sm text-slate-400">&copy; {% now "Y" %} Hive Core Management System.</p>
            </div>
        </footer>
    </body>
</html>
